name: Bug Report
description: An unexpected problem or behavior
title: "[Bug]: "
type: Bug
labels: ["needs-triage"]
projects: ["FleetCore"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - agent
        - backend
        - deployment
        - desktop
        - lib
    validations:
      required: true