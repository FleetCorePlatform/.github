name: Security
description: Vulnerability or exposure
title: "[Security]: "
type: Security
labels: ["needs-triage"]
projects: ["FleetCorePlatform/1"]
body:
  - type: markdown
    attributes:
      value: "WARNING: Only report non-critical vulnerabilities here. For critical or system-breaking issues that pose direct risk if disclosed publicly, contact us via email or Discord instead."
  - type: textarea
    id: scope
    attributes:
      label: Target Component / Scope
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Security Objective
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - agent
        - backend
        - deployment
        - desktop
        - lib
    validations:
      required: true